<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Calculator</title>

    <link href="./styles/general.css" rel="stylesheet"/>
    <link href="./styles/container.css" rel="stylesheet"/>
    <link href="./styles/display.css" rel="stylesheet"/>
    <link href="./styles/calculator.css" rel="stylesheet"/>
  </head>
  <body>
    <div class="container">
      <div class="calculator">
        <form>
          <div class="display">
            <input type="text" name="display"/>
          </div>
          <div>
            <input class="operator" type="button" name="erease" value="AC" onclick="display.value = ''"/>
            <input class="operator" type="button" name="delete" value="DE" onclick="
              display.value = (display.value).toString().slice(0, -1)"/>
            <input class="operator" type="button" name="modulus" value="%" onclick="display.value += '%'"/>
            <input class="operator" type="button" name="divide" value="/" onclick="display.value += '/'"/>
          </div>
          <div>
            <input type="button" name="seven" value="7" onclick="display.value += '7'"/>
            <input type="button" name="eight" value="8" onclick="display.value += '8'"/>
            <input type="button" name="nine" value="9" onclick="display.value += '9'"/>
            <input class="operator" type="button" name="multiply" value="*" onclick="display.value += '*'"/>
          </div>
          <div>
            <input type="button" name="four" value="4" onclick="display.value += '4'"/>
            <input type="button" name="five" value="5" onclick="display.value += '5'"/>
            <input type="button" name="six" value="6" onclick="display.value += '6'"/>
            <input class="operator" type="button" name="substract" value="-" onclick="display.value += '-'"/>
          </div>
          <div>
            <input type="button" name="one" value="1" onclick="display.value += '1'"/>
            <input type="button" name="two" value="2" onclick="display.value += '2'"/>
            <input type="button" name="six" value="3" onclick="display.value += '3'"/>
            <input class="operator" type="button" name="add" value="+" onclick="display.value += '+'"/>
          </div>
          <div>
            <input type="button" name="sign" value="00" onclick="display.value += '00'"/>
            <input type="button" name="zero" value="0" onclick="display.value += '0'"/>
            <input type="button" name="dot" value="." onclick="display.value += '.'"/>
            <input class="operator" type="button" name="equal" value="=" onclick="
            display.value = eval(display.value)"/>
          </div>
        </form>
      </div>
    </div>
    <script src="./scripts/index.js"></script>
  </body>
</html>
